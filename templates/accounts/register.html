{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
    <h2 class="mb-4">Register your cat account</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-soft">Register</button>
    </form>
{% endblock %}
